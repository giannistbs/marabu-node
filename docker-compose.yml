services:
  node:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: marabu-node
    env_file: .env
    environment:
      - MARABU_HOST=0.0.0.0
      - MARABU_PEERS_FILE=/app/data/peers.json
    ports:
      - "${MARABU_PORT:-18018}:${MARABU_PORT:-18018}"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('net').connect(+(process.env.MARABU_PORT||18018),'127.0.0.1',function(){this.destroy();process.exit(0)}).on('error',function(){process.exit(1)})\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

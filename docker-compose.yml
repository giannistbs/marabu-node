services:
  node:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: marabu-node
    env_file: .env
    environment:
      - MARABU_HOST=0.0.0.0
      - MARABU_PEERS_FILE=/app/data/peers.json
    ports:
      - "${MARABU_PORT:-18018}:${MARABU_PORT:-18018}"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

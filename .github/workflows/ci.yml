name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

  docker:
    runs-on: ubuntu-latest
    needs: build-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile .
